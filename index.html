<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant Boosting</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Orbitron',sans-serif; background:#0f1923; color:white; }

.hero { position:relative; height:500px; }
.hero img { width:100%; height:100%; object-fit:cover; }
.hero-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:flex; flex-direction:column; justify-content:center; align-items:center;
}

h1 { color:#ff4655; font-size:3em; margin:0; }
.btn {
  padding:10px 20px; border-radius:10px; margin:5px;
  text-decoration:none; color:white; font-weight:bold;
}
.discord { background:#5865F2; }
.email { background:#28a745; }

.section { padding:40px; text-align:center; }

.card {
  background:#1a242f;
  padding:20px;
  border-radius:15px;
  width:320px;
  margin:auto;
  box-shadow:0 0 20px rgba(255,70,85,0.4);
}

select, label {
  width:100%;
  margin:5px 0;
}

input[type="checkbox"] {
  margin-right:5px;
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#ff4655;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.price {
  font-size:1.5em;
  margin-top:10px;
  color:#00ffcc;
}
</style>
</head>

<body>

<div class="hero">
  <img src="https://images.unsplash.com/photo-1625487811200-2f03b3120cbb?auto=format&fit=crop&w=1470&q=80">
  <div class="hero-overlay">
    <h1>Valorant Boosting</h1>
    <p>Fast & Secure Rank Boosting</p>
    <a class="btn discord" href="https://discord.gg/xhaFE783" target="_blank">Discord</a>
    <a class="btn email" href="mailto:spyroselotor@gmail.com">Email</a>
  </div>
</div>

<div class="section">
  <h2>💰 Order Boost</h2>

  <div class="card">

    <select id="fromRank">
      <option value="">From Rank</option>
      <option>Iron I</option><option>Iron II</option><option>Iron III</option>
      <option>Bronze I</option><option>Bronze II</option><option>Bronze III</option>
      <option>Silver I</option><option>Silver II</option><option>Silver III</option>
      <option>Gold I</option><option>Gold II</option><option>Gold III</option>
      <option>Platinum I</option><option>Platinum II</option><option>Platinum III</option>
      <option>Diamond I</option><option>Diamond II</option><option>Diamond III</option>
      <option>Immortal</option>
    </select>

    <select id="toRank">
      <option value="">To Rank</option>
      <option>Iron I</option><option>Iron II</option><option>Iron III</option>
      <option>Bronze I</option><option>Bronze II</option><option>Bronze III</option>
      <option>Silver I</option><option>Silver II</option><option>Silver III</option>
      <option>Gold I</option><option>Gold II</option><option>Gold III</option>
      <option>Platinum I</option><option>Platinum II</option><option>Platinum III</option>
      <option>Diamond I</option><option>Diamond II</option><option>Diamond III</option>
      <option>Immortal</option>
    </select>

    <!-- EXTRA OPTIONS -->
    <label><input type="checkbox" id="express"> ⚡ Express Boost (+50%)</label>
    <label><input type="checkbox" id="duo"> 🎮 Duo Queue (+40%)</label>
    <label><input type="checkbox" id="vpn"> 🔒 VPN Protection (+20%)</label>

    <div class="price">$<span id="price">0</span></div>

    <button onclick="order()">Order Now</button>
  </div>
</div>

<script>
const divisions = [
"Iron I","Iron II","Iron III",
"Bronze I","Bronze II","Bronze III",
"Silver I","Silver II","Silver III",
"Gold I","Gold II","Gold III",
"Platinum I","Platinum II","Platinum III",
"Diamond I","Diamond II","Diamond III",
"Immortal"
];

function getPrice(rank){
  if(rank.includes("Iron")) return 2;
  if(rank.includes("Bronze")) return 3;
  if(rank.includes("Silver")) return 4;
  if(rank.includes("Gold")) return 6;
  if(rank.includes("Platinum")) return 8;
  if(rank.includes("Diamond")) return 12;
  if(rank.includes("Immortal")) return 20;
}

function calcPrice(){
  const from = document.getElementById("fromRank").value;
  const to = document.getElementById("toRank").value;

  if(!from || !to){ document.getElementById("price").innerText = 0; return; }

  let total = 0;
  let start = divisions.indexOf(from);
  let end = divisions.indexOf(to);

  if(end <= start){ document.getElementById("price").innerText="Invalid"; return; }

  for(let i=start;i<end;i++){
    total += getPrice(divisions[i]);
  }

  // extras
  if(document.getElementById("express").checked) total *= 1.5;
  if(document.getElementById("duo").checked) total *= 1.4;
  if(document.getElementById("vpn").checked) total *= 1.2;

  document.getElementById("price").innerText = Math.round(total);
}

document.querySelectorAll("select,input").forEach(el=>{
  el.addEventListener("change", calcPrice);
});

function order(){
  const from = document.getElementById("fromRank").value;
  const to = document.getElementById("toRank").value;
  const price = document.getElementById("price").innerText;

  if(!from || !to){ alert("Select ranks first"); return; }

  const msg = `Boost from ${from} to ${to} - $${price}`;
  
  window.open("https://discord.gg/xhaFE783","_blank");
  window.open(`mailto:spyroselotor@gmail.com?subject=Order&body=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
