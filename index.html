<script>
const rankValues = {
  "Iron": 5,
  "Bronze": 7,
  "Silver": 10,
  "Gold": 15,
  "Platinum": 20,
  "Diamond": 30,
  "Immortal": 50
};

function updatePrice(){
  const from = document.getElementById("fromRank").value;
  const to = document.getElementById("toRank").value;

  if(!from || !to){
    document.getElementById("price").innerText = 0;
    return;
  }

  const ranks = ["Iron","Bronze","Silver","Gold","Platinum","Diamond","Immortal"];

  const fromIndex = ranks.indexOf(from);
  const toIndex = ranks.indexOf(to);

  if(toIndex <= fromIndex){
    document.getElementById("price").innerText = "Invalid";
    return;
  }

  let total = 0;

  for(let i = fromIndex; i < toIndex; i++){
    total += rankValues[ranks[i]];
  }

  document.getElementById("price").innerText = total;
}

document.getElementById("fromRank").onchange = updatePrice;
document.getElementById("toRank").onchange = updatePrice;
</script>
