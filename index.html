<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant Boosting</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(135deg, #0f1923, #1f2a35);
  color: white;
  text-align: center;
}

header {
  padding: 50px;
}

h1 {
  font-size: 3em;
  color: #ff4655;
}

.section {
  padding: 50px;
}

.pricing {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #1a242f;
  padding: 20px;
  border-radius: 15px;
  width: 250px;
  box-shadow: 0 0 15px rgba(255,70,85,0.3);
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  background: #ff4655;
  color: white;
  cursor: pointer;
  border-radius: 10px;
}

footer {
  padding: 20px;
  font-size: 0.8em;
  opacity: 0.6;
}
</style>

</head>

<body>

<header>
  <h1>Valorant Boosting</h1>
  <p>Rank up γρήγορα & με ασφάλεια</p>
</header>

<section class="section">
  <h2>💰 Τιμές</h2>
  <div class="pricing">
    
    <div class="card">
      <h3>Iron → Gold</h3>
      <p>€20</p>
      <button onclick="order()">Order</button>
    </div>

    <div class="card">
      <h3>Gold → Diamond</h3>
      <p>€50</p>
      <button onclick="order()">Order</button>
    </div>

    <div class="card">
      <h3>Diamond → Immortal</h3>
      <p>€100</p>
      <button onclick="order()">Order</button>
    </div>

  </div>
</section>

<section class="section">
  <h2>⭐ Reviews</h2>
  <p>"Πήγα Immortal σε 3 μέρες!"</p>
  <p>"Πολύ αξιόπιστο service"</p>
</section>

<section class="section">
  <h2>📩 Contact</h2>
  <p>Discord: yourname#1234</p>
</section>

<footer>
  <p>Not affiliated with Riot Games. Use at your own risk.</p>
</footer>

<script>
function order() {
  alert("Στείλε DM στο Discord!");
}
</script>

</body>
</html>
