<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant Boosting Service</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Orbitron',sans-serif; background:#0f1923; color:white; }

.hero { position:relative; width:100%; height:500px; overflow:hidden; }
.hero img { width:100%; height:100%; object-fit:cover; }
.hero-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(15,25,35,0.7);
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  text-align:center; padding:20px;
}
.hero-overlay h1 { font-size:3em; color:#ff4655; margin:0 0 10px 0; }
.hero-overlay p { font-size:1.2em; margin:0 0 20px 0; }

.btn {
  display:inline-block;
  padding:12px 25px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  margin:5px;
}

.discord { background:#5865F2; color:white; }
.email { background:#28a745; color:white; }

.section { padding:50px 20px; text-align:center; }

.card {
  background:#1a242f;
  padding:20px;
  border-radius:15px;
  width:260px;
  margin:auto;
  box-shadow:0 0 20px rgba(255,70,85,0.5);
}

select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button {
  margin-top:10px;
  padding:10px 20px;
  border:none;
  background:#ff4655;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

footer { padding:20px; font-size:0.8em; opacity:0.7; }

@media(max-width:768px){
  .hero-overlay h1{font-size:2em;}
}
</style>
</head>

<body>

<header class="hero">
  <img src="https://images.unsplash.com/photo-1625487811200-2f03b3120cbb?auto=format&fit=crop&w=1470&q=80">
  <div class="hero-overlay">
    <h1>Valorant Boosting</h1>
    <p>Fast & Reliable Rank Boosting</p>
    <a class="btn discord" href="https://discord.gg/xhaFE783" target="_blank">Join Discord</a>
    <a class="btn email" href="mailto:spyroselotor@gmail.com?subject=Valorant Boost Order" target="_blank">Email Us</a>
  </div>
</header>

<section class="section">
  <h2>💰 Order Boost</h2>

  <div class="card">
    <p>Select your ranks:</p>

    <select id="fromRank">
      <option value="">From Rank</option>
      <option>Iron</option>
      <option>Bronze</option>
      <option>Silver</option>
      <option>Gold</option>
      <option>Platinum</option>
      <option>Diamond</option>
    </select>

    <select id="toRank">
      <option value="">To Rank</option>
      <option>Bronze</option>
      <option>Silver</option>
      <option>Gold</option>
      <option>Platinum</option>
      <option>Diamond</option>
      <option>Immortal</option>
    </select>

    <p>Price: $<span id="price">0</span></p>

    <button onclick="order()">Order Now</button>
  </div>
</section>

<footer>
  <p>Not affiliated with Riot Games. Use at your own risk.</p>
</footer>

<script>
const prices = {
 "Iron-Bronze":20,"Iron-Silver":30,"Iron-Gold":40,
 "Bronze-Silver":25,"Bronze-Gold":35,
 "Silver-Gold":30,"Silver-Platinum":50,
 "Gold-Platinum":40,"Gold-Diamond":60,
 "Platinum-Diamond":50,"Diamond-Immortal":100
};

function updatePrice(){
  const from = document.getElementById("fromRank").value;
  const to = document.getElementById("toRank").value;
  const key = from + "-" + to;
  document.getElementById("price").innerText = prices[key] || 0;
}

document.getElementById("fromRank").onchange = updatePrice;
document.getElementById("toRank").onchange = updatePrice;

function order(){
  const from = document.getElementById("fromRank").value;
  const to = document.getElementById("toRank").value;
  const price = document.getElementById("price").innerText;

  if(!from || !to){
    alert("Select ranks first!");
    return;
  }

  const message = `Hello, I want a boost from ${from} to ${to} for $${price}`;
  
  window.open("https://discord.gg/xhaFE783", "_blank");
  window.open(`mailto:spyroselotor@gmail.com?subject=Boost Order&body=${encodeURIComponent(message)}`);
}
</script>

</body>
</html>
