<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant Boost Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Orbitron',sans-serif; background:#0f1923; color:white; }

/* HERO */
.hero { position:relative; height:500px; }
.hero img { width:100%; height:100%; object-fit:cover; }
.hero-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:flex; flex-direction:column; justify-content:center; align-items:center;
}
h1 { color:#ff4655; font-size:3em; }

.btn {
  padding:10px 20px;
  border-radius:10px;
  margin:5px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}
.discord { background:#5865F2; }
.email { background:#28a745; }

/* CARD */
.section { padding:40px; text-align:center; }
.card {
  background:#1a242f;
  padding:20px;
  border-radius:15px;
  width:360px;
  margin:auto;
  box-shadow:0 0 25px rgba(255,70,85,0.5);
}

select, input { width:100%; margin:6px 0; padding:8px; border-radius:8px; border:none; }

.price {
  font-size:2em;
  color:#00ffcc;
  transition:0.3s;
}

.badge {
  background:gold;
  color:black;
  padding:5px 10px;
  border-radius:10px;
  font-size:0.8em;
}

/* AGENTS */
.agents img {
  width:70px;
  margin:5px;
  border-radius:10px;
  transition:0.3s;
}
.agents img:hover { transform:scale(1.1); }

/* CHECKOUT MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:#1a242f;
  padding:20px;
  border-radius:15px;
  width:300px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#ff4655;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="https://images.unsplash.com/photo-1625487811200-2f03b3120cbb?auto=format&fit=crop&w=1470&q=80">
  <div class="hero-overlay">
    <h1>Valorant Boost Pro</h1>
    <a class="btn discord" href="https://discord.gg/xhaFE783" target="_blank">Discord</a>
    <a class="btn email" href="mailto:spyroselotor@gmail.com">Email</a>
  </div>
</div>

<div class="section">

<h2>💎 Boost Order <span class="badge">Most Popular</span></h2>

<div class="card">

<select id="fromRank"></select>
<select id="toRank"></select>

<label>📊 RR (+100 RR = $25)</label>
<input type="number" id="rr" value="0">

<label><input type="checkbox" id="placement"> 🎯 Placement (+$40)</label>
<label><input type="checkbox" id="express"> ⚡ Express (+70%)</label>
<label><input type="checkbox" id="duo"> 🎮 Duo (+50%)</label>
<label><input type="checkbox" id="vpn"> 🔒 VPN (+30%)</label>

<div class="agents">
<img src="https://static.wikia.nocookie.net/valorant/images/7/77/Jett_icon.png">
<img src="https://static.wikia.nocookie.net/valorant/images/3/3f/Reyna_icon.png">
<img src="https://static.wikia.nocookie.net/valorant/images/9/9f/Phoenix_icon.png">
</div>

<div class="price">$<span id="price">0</span></div>

<button onclick="openCheckout()">Checkout</button>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Fake Payment 💳</h3>
    <p>Total: $<span id="finalPrice"></span></p>
    <button onclick="confirmOrder()">Pay Now</button>
  </div>
</div>

<script>
const endpoint = "https://formspree.io/f/xxxxx"; // ΒΑΛΕ ΤΟ ΔΙΚΟ ΣΟΥ

const divisions = [
"Iron I","Iron II","Iron III",
"Bronze I","Bronze II","Bronze III",
"Silver I","Silver II","Silver III",
"Gold I","Gold II","Gold III",
"Platinum I","Platinum II","Platinum III",
"Diamond I","Diamond II","Diamond III",
"Immortal"
];

// fill dropdowns
divisions.forEach(r=>{
  fromRank.innerHTML += `<option>${r}</option>`;
  toRank.innerHTML += `<option>${r}</option>`;
});

function getPrice(r){
  if(r.includes("Iron")) return 6;
  if(r.includes("Bronze")) return 9;
  if(r.includes("Silver")) return 14;
  if(r.includes("Gold")) return 22;
  if(r.includes("Platinum")) return 30;
  if(r.includes("Diamond")) return 50;
  if(r.includes("Immortal")) return 80;
}

function calc(){
  let total=0;
  let s=divisions.indexOf(fromRank.value);
  let e=divisions.indexOf(toRank.value);
  if(e<=s){ price.innerText="Invalid"; return; }

  for(let i=s;i<e;i++) total+=getPrice(divisions[i]);

  total+=rr.value*0.25;

  if(placement.checked) total+=40;
  if(express.checked) total*=1.7;
  if(duo.checked) total*=1.5;
  if(vpn.checked) total*=1.3;

  price.innerText=Math.round(total);
}

document.querySelectorAll("select,input").forEach(e=>e.addEventListener("change",calc));

function openCheckout(){
  finalPrice.innerText=price.innerText;
  modal.style.display="flex";
}

function confirmOrder(){
  let msg=`ORDER:
From ${fromRank.value} to ${toRank.value}
Price $${price.innerText}`;

  fetch(endpoint,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  window.open("https://discord.gg/xhaFE783","_blank");
  alert("Order sent to Discord 🔥");
}
</script>

</body>
</html>
