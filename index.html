<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant Boost Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Orbitron',sans-serif; background:#0f1923; color:white; }

/* HERO */
.hero { position:relative; height:500px; }
.hero img { width:100%; height:100%; object-fit:cover; }
.hero-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:flex; flex-direction:column; justify-content:center; align-items:center;
}

h1 { color:#ff4655; font-size:3em; }

.btn { padding:10px 20px; border-radius:10px; margin:5px; text-decoration:none; color:white; font-weight:bold; }
.discord { background:#5865F2; }
.email { background:#28a745; }

/* CARD */
.section { padding:40px; text-align:center; }
.card {
  background:#1a242f;
  padding:20px;
  border-radius:15px;
  width:350px;
  margin:auto;
  box-shadow:0 0 20px rgba(255,70,85,0.5);
}

select, label { width:100%; margin:5px 0; }

.price {
  font-size:2em;
  color:#00ffcc;
  transition:0.3s;
}

.badge {
  background:gold;
  color:black;
  padding:5px 10px;
  border-radius:10px;
  font-size:0.8em;
}

/* AGENTS */
.agents img {
  width:80px;
  margin:5px;
  border-radius:10px;
}

button {
  width:100%;
  padding:10px;
  background:#ff4655;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="https://images.unsplash.com/photo-1625487811200-2f03b3120cbb?auto=format&fit=crop&w=1470&q=80">
  <div class="hero-overlay">
    <h1>Valorant Boost Pro</h1>
    <a class="btn discord" href="https://discord.gg/xhaFE783" target="_blank">Discord</a>
    <a class="btn email" href="mailto:spyroselotor@gmail.com">Email</a>
  </div>
</div>

<div class="section">

<h2>💎 Boost Order <span class="badge">Most Popular</span></h2>

<div class="card">

<select id="fromRank">
<option value="">From Rank</option>
<option>Iron I</option><option>Iron II</option><option>Iron III</option>
<option>Bronze I</option><option>Bronze II</option><option>Bronze III</option>
<option>Silver I</option><option>Silver II</option><option>Silver III</option>
<option>Gold I</option><option>Gold II</option><option>Gold III</option>
<option>Platinum I</option><option>Platinum II</option><option>Platinum III</option>
<option>Diamond I</option><option>Diamond II</option><option>Diamond III</option>
<option>Immortal</option>
</select>

<select id="toRank">
<option value="">To Rank</option>
<option>Iron I</option><option>Iron II</option><option>Iron III</option>
<option>Bronze I</option><option>Bronze II</option><option>Bronze III</option>
<option>Silver I</option><option>Silver II</option><option>Silver III</option>
<option>Gold I</option><option>Gold II</option><option>Gold III</option>
<option>Platinum I</option><option>Platinum II</option><option>Platinum III</option>
<option>Diamond I</option><option>Diamond II</option><option>Diamond III</option>
<option>Immortal</option>
</select>

<!-- RR -->
<label>📊 RR Boost (+100 RR = $20)</label>
<input type="number" id="rr" value="0">

<!-- Placement -->
<label>🎯 Placement Games (+$30)</label>
<input type="checkbox" id="placement">

<!-- Extras -->
<label><input type="checkbox" id="express"> ⚡ Express (+70%)</label>
<label><input type="checkbox" id="duo"> 🎮 Duo (+50%)</label>
<label><input type="checkbox" id="vpn"> 🔒 VPN (+30%)</label>

<!-- AGENTS -->
<div class="agents">
<img src="https://static.wikia.nocookie.net/valorant/images/7/77/Jett_icon.png">
<img src="https://static.wikia.nocookie.net/valorant/images/3/3f/Reyna_icon.png">
<img src="https://static.wikia.nocookie.net/valorant/images/9/9f/Phoenix_icon.png">
</div>

<div class="price">$<span id="price">0</span></div>

<button onclick="order()">Checkout</button>

</div>
</div>

<script>
const divisions = [
"Iron I","Iron II","Iron III",
"Bronze I","Bronze II","Bronze III",
"Silver I","Silver II","Silver III",
"Gold I","Gold II","Gold III",
"Platinum I","Platinum II","Platinum III",
"Diamond I","Diamond II","Diamond III",
"Immortal"
];

function getPrice(rank){
  if(rank.includes("Iron")) return 5;
  if(rank.includes("Bronze")) return 8;
  if(rank.includes("Silver")) return 12;
  if(rank.includes("Gold")) return 18;
  if(rank.includes("Platinum")) return 25;
  if(rank.includes("Diamond")) return 40;
  if(rank.includes("Immortal")) return 70;
}

function calc(){
  let from = fromRank.value;
  let to = toRank.value;

  if(!from || !to){ price.innerText=0; return; }

  let total = 0;
  let start = divisions.indexOf(from);
  let end = divisions.indexOf(to);

  if(end<=start){ price.innerText="Invalid"; return; }

  for(let i=start;i<end;i++){
    total += getPrice(divisions[i]);
  }

  total += rr.value * 0.2;

  if(placement.checked) total += 30;
  if(express.checked) total *= 1.7;
  if(duo.checked) total *= 1.5;
  if(vpn.checked) total *= 1.3;

  price.innerText = Math.round(total);
}

document.querySelectorAll("select,input").forEach(e=>e.addEventListener("change", calc));

function order(){
  let msg = `Boost Order | From ${fromRank.value} to ${toRank.value} | $${price.innerText}`;
  window.open("https://discord.gg/xhaFE783","_blank");
  window.open(`mailto:spyroselotor@gmail.com?subject=Order&body=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
