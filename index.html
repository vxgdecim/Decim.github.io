<script>
const endpoint = "YOUR_FORMSPREE_ENDPOINT"; // π.χ. https://formspree.io/f/abcd1234

function order(){
  const data = {
    from: fromRank.value,
    to: toRank.value,
    price: price.innerText,
    rr: rr.value,
    placement: placement.checked,
    express: express.checked,
    duo: duo.checked,
    vpn: vpn.checked
  };

  if(!data.from || !data.to){
    alert("Select ranks first!");
    return;
  }

  // Στέλνει το order στο Formspree
  fetch(endpoint,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message: `
🎮 NEW ORDER

From: ${data.from}
To: ${data.to}
Price: $${data.price}

RR: ${data.rr}
Placement: ${data.placement}
Express: ${data.express}
Duo: ${data.duo}
VPN: ${data.vpn}
      `
    })
  }).then(()=>{
    alert("Order sent! Check your Discord/email 🔥");
    window.open("https://discord.gg/xhaFE783","_blank"); // ανοίγει Discord link
  }).catch((err)=>{
    alert("Something went wrong: " + err);
  });
}
</script>
